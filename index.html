<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

<main>
    <img src="./img/sort 1.png" alt="logo-sort">

    <div>
        <p class="title">Sortear um número</p>
        <div class="input-box">
            <input class="input-min" type="number" placeholder="entre">
            <input class="input-max" type="number" placeholder="e">
        </div>
    </div>

    <button>Sortear</button>

    <p class="winning-number">Número sorteado</p>
<input class="result" type="text" placeholder="?" disabled>

    </main>

</body>

<script src="./scripts.js"></script>

</html>
